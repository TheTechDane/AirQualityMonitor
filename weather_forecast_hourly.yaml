# weather_forecast_hourly.yaml
# Generic hourly forecast — all 48 slots as HA sensors.
# Sensor naming: sensor.weather_fc_NN_<field>  (NN = 00 to 47)
#
# Fields per slot:
#   sensor.weather_fc_NN_condition     e.g. 'partlycloudy'
#   sensor.weather_fc_NN_temperature   °C
#   sensor.weather_fc_NN_wind_speed    m/s (converted from km/h)
#   sensor.weather_fc_NN_precipitation mm
#   sensor.weather_fc_NN_precip_prob   %
#   sensor.weather_fc_NN_timestamp     unix timestamp
#
# Reuse examples:
#   Air monitor : slots 05
#   Clock 24h   : slots 00, 04, 08, 12, 16, 20, 24

template:
  - trigger:
      - platform: time_pattern
        hours: "/1"
      - trigger: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: forecast_data

    sensor:
      # ── Slot 00 ──────────────────────────────────────────
      - name: "Weather FC 00 Condition"
        unique_id: weather_fc_00_condition
        state: >
          {{ forecast_data['weather.forecast_home'].forecast[0].condition }}

      - name: "Weather FC 00 Temperature"
        unique_id: weather_fc_00_temperature
        unit_of_measurement: "°C"
        state: >
          {{ forecast_data['weather.forecast_home'].forecast[0].temperature | round(1) }}

      - name: "Weather FC 00 Wind Speed"
        unique_id: weather_fc_00_wind_speed
        unit_of_measurement: "m/s"
        state: >
          {{ (forecast_data['weather.forecast_home'].forecast[0].wind_speed | float / 3.6) | round(1) }}

      - name: "Weather FC 00 Precipitation"
        unique_id: weather_fc_00_precipitation
        unit_of_measurement: "mm"
        state: >
          {{ forecast_data['weather.forecast_home'].forecast[0].precipitation }}

      - name: "Weather FC 00 Precip Prob"
        unique_id: weather_fc_00_precip_prob
        unit_of_measurement: "%"
        state: >
          {{ forecast_data['weather.forecast_home'].forecast[0].precipitation_probability | default(0) }}

      - name: "Weather FC 00 Timestamp"
        unique_id: weather_fc_00_timestamp
        state: >
          {{ as_timestamp(forecast_data['weather.forecast_home'].forecast[0].datetime) }}

      # ── Slot 01 ──────────────────────────────────────────
