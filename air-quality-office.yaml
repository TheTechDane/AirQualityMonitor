# ============================================================
#  Air Quality Monitor — ESPHome
#  Hardware : ESP32 + Sensirion SEN66 + WeAct 2.9" b/w e-paper
#  HA link  : Native API
#  Version 2.1 — Open-Meteo 12h weather forecast with icons
# ============================================================
substitutions:
  device_name:      air-quality-monitor
  friendly_name:    "Air Quality Monitor"
  sensor_interval:  "30s"
  display_interval: "60s"
  dark_mode:        0     ##set to 1 if you want dark mode

# ------------------------------------------------------------
#  Core
# ------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 200
    then:
      - component.update: epaper_display

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ixrxDO8pFdi/Du12W6IGIW+hPh2GXquUadV7QqGdmsg="

ota:
  - platform: esphome
    password: "5314e56e147aa5f16f2524cdb60bc62e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air-Quality-Office"
    password: "t0Ogjbkmnu2S"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
    timezone: "Europe/Copenhagen"

font:
  - file: "gfonts://PT Sans Narrow"
    id: lable_font
    size: 15
  - file: "gfonts://PT Sans Narrow"
    id: mini_lable_font
    size: 9
  - file:
      type: gfonts
      family: Smooch Sans
      weight: 700
    id: txt_font
    size: 40

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_weather
    size: 24
    glyphs:
      - "\U000F0599"   # mdi-weather-sunny
      - "\U000F0594"   # mdi-weather-night
      - "\U000F0596"   # mdi-weather-cloudy
      - "\U000F0595"   # mdi-weather-partly-cloudy
      - "\U000F0590"   # mdi-weather-rainy
      - "\U000F0592"   # mdi-weather-pouring
      - "\U000F0597"   # mdi-weather-snowy
      - "\U000F067E"   # mdi-weather-fog
      - "\U000F0593"   # mdi-weather-lightning-rainy
      - "\U000F0F33"   # mdi-weather-snowy-rainy
      - "\U000F059D"   # mdi-weather-windy
      - "\U000F059E"   # mdi-weather-windy-variant
      - "\U000F0591"   # mdi-weather-hail

uart:
  - id: uart_ze08
    rx_pin: GPIO17
    tx_pin: GPIO16
    baud_rate: 9600

globals:
  - id: refresh_counter
    type: int
    initial_value: '0'

external_components:
  - source: components
      #type: local
      #path: components
      # this is path to the directory where the "ze08_ch2o" is located within "config/esphome"
      # Library: https://github.com/haplm/winsen_ze08_ch2o
    components: [ze08_ch2o]

ze08_ch2o:
  uart_id: uart_ze08
  update_interval: 20s

i2c:
  sda: GPIO22
  scl: GPIO23
  scl_pullup_enabled: True
  sda_pullup_enabled: True
  scan: true
  id: bus_a
  frequency: 100000

# Example configuration entry
sensor:
  - platform: sen6x
    type: SEN66
    id: qualitySense
    update_interval: ${sensor_interval}
    pm_1_0:
      id: pm_1_0
      name: "PM 1"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    pm_2_5:
      id: pm_2_5
      name: "PM 2.5"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    pm_4_0:
      id: pm_4_0
      name: "PM 4"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    pm_10_0:
      id: pm_10_0
      name: "PM 10"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    temperature:
      id: temp
      name: "Temperature"
      unit_of_measurement: "°C"
      accuracy_decimals: 1
    humidity:
      id: humidity
      name: "Humidity"
      unit_of_measurement: "%"
      accuracy_decimals: 1
    voc:
      id: voc
      name: "VOC Index"
      accuracy_decimals: 0
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    nox:
      id: nox
      name: "NOx index"
      accuracy_decimals: 0
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    co2:
      id: co2
      name: "CO2"
      unit_of_measurement: "ppm"
      accuracy_decimals: 0
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
      on_value:
          then:
            - component.update: epaper_display
    
  - platform: ze08_ch2o
    formaldehyde:
      id: ch2o
      name: "Formaldehyde sensor"
      unit_of_measurement: "µg/m³"
      icon: "mdi:molecule"
      device_class: "volatile_organic_compounds"
      on_value:
        then:
          - component.update: epaper_display
      
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: homeassistant
    id: wx_temp
    entity_id: sensor.weather_12h_temperature
    internal: true
    on_value:
        then:
          - component.update: epaper_display
          - logger.log:
              format: "forcast temp %.1f"
              args: [ 'x' ]

  - platform: homeassistant
    id: wx_wind
    entity_id: sensor.weather_12h_wind_speed
    internal: true
    on_value:
        then:
          - logger.log:
              format: "forcast wind %.1f"
              args: [ 'x' ]

  - platform: homeassistant
    id: wx_precip
    entity_id: sensor.weather_12h_precipitation
    internal: true
    on_value:
        then:
          - logger.log:
              format: "forcast persp %.1f"
              args: [ 'x' ] 
  
  - platform: homeassistant
    id: wx_time
    entity_id: sensor.weather_12h_time_stamp
    internal: true
    on_value:
        then:
          - logger.log:
              format: "forcast persp %f"
              args: [ 'x' ]

# ============================================================
#  TEXT SENSORS — severity level per metric
#
#  Each publishes one of: "good" | "elevated" | "critical" | "unknown"
#  These appear as individual entities in HA and are ideal for
#  dashboard state-color cards and automation triggers.
#
#  Thresholds (WHO/EU guidelines; PM1+PM4 interpolated):
#  +---------+-----------+-------------+------------+
#  | Metric  |   Good    |  Elevated   |  Critical  |
#  +---------+-----------+-------------+------------+
#  | PM1     | <  5 ug/m | 5-15  ug/m  | > 15 ug/m  |
#  | PM2.5   | < 12 ug/m | 12-35 ug/m  | > 35 ug/m  |
#  | PM4     | < 15 ug/m | 15-40 ug/m  | > 40 ug/m  |
#  | PM10    | < 20 ug/m | 20-50 ug/m  | > 50 ug/m  |
#  | CO2     | < 800 ppm | 800-1200ppm | > 1200 ppm |
#  | VOC idx | < 150     | 150-250     | > 250      |
#  | NOx idx | <  20     | 20-150      | > 150      |
#  | CH2O    | < 50 ug/m | 50-100ug/m  | > 100 ug/m |
#  +---------+-----------+-------------+------------+
# ============================================================
text_sensor:
  - platform: template
    name: "PM1 Status"
    id: pm1_status
    icon: mdi:air-filter
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(pm_1_0).state))           return {"unknown"};
      if (id(pm_1_0).state < 5.0f)           return {"good"};
      else if (id(pm_1_0).state < 15.0f)     return {"elevated"};
      else                                   return {"critical"};

  - platform: template
    name: "PM2.5 Status"
    id: pm25_status
    icon: mdi:air-filter
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(pm_2_5).state))          return {"unknown"};
      if (id(pm_2_5).state < 12.0f)         return {"good"};
      else if (id(pm_2_5).state < 35.0f)    return {"elevated"};
      else                                  return {"critical"};

  - platform: template
    name: "PM4 Status"
    id: pm4_status
    icon: mdi:air-filter
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(pm_4_0).state))           return {"unknown"};
      if (id(pm_4_0).state < 15.0f)          return {"good"};
      else if (id(pm_4_0).state < 40.0f)     return {"elevated"};
      else                                   return {"critical"};

  - platform: template
    name: "PM10 Status"
    id: pm10_status
    icon: mdi:air-filter
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(pm_10_0).state))          return {"unknown"};
      if (id(pm_10_0).state < 20.0f)         return {"good"};
      else if (id(pm_10_0).state < 50.0f)    return {"elevated"};
      else                                   return {"critical"};

  - platform: template
    name: "CO2 Status"
    id: co2_status
    icon: mdi:molecule-co2
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(co2).state))           return {"unknown"};
      if (id(co2).state < 800.0f)         return {"good"};
      else if (id(co2).state < 1200.0f)   return {"elevated"};
      else                                return {"critical"};

  - platform: template
    name: "VOC Status"
    id: voc_status
    icon: mdi:chemical-weapon
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(voc).state))           return {"unknown"};
      if (id(voc).state < 150.0f)         return {"good"};
      else if (id(voc).state < 250.0f)    return {"elevated"};
      else                                return {"critical"};

  - platform: template
    name: "NOx Status"
    id: nox_status
    icon: mdi:smoke
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(nox).state))           return {"unknown"};
      if (id(nox).state < 20.0f)          return {"good"};
      else if (id(nox).state < 150.0f)    return {"elevated"};
      else                                return {"critical"};

  - platform: template
    name: "ch2o Status"
    id: ch2o_status
    icon: mdi:smoke
    update_interval: ${sensor_interval}
    lambda: |-
      if (isnan(id(ch2o).state))           return {"unknown"};
      if (id(ch2o).state < 50.0f)          return {"good"};
      else if (id(ch2o).state < 100.0f)    return {"elevated"};
      else                                 return {"critical"};


  # Worst-case rollup — single entity for HA dashboard + automations
  - platform: template
    name: "Overall Air Quality"
    id: overall_status
    icon: mdi:air-quality
    update_interval: ${sensor_interval}
    lambda: |-
      bool crit =
        id(pm1_status).state  == "critical" ||
        id(pm25_status).state == "critical" ||
        id(pm4_status).state  == "critical" ||
        id(pm10_status).state == "critical" ||
        id(co2_status).state  == "critical" ||
        id(voc_status).state  == "critical" ||
        id(nox_status).state  == "critical" ||
        id(ch2o_status).state == "critical";
      bool elev =
        id(pm1_status).state  == "elevated" ||
        id(pm25_status).state == "elevated" ||
        id(pm4_status).state  == "elevated" ||
        id(pm10_status).state == "elevated" ||
        id(co2_status).state  == "elevated" ||
        id(voc_status).state  == "elevated" ||
        id(nox_status).state  == "elevated" ||
        id(ch2o_status).state == "elevated";
      if (crit) return {"critical"};
      if (elev) return {"elevated"};
      return {"good"};

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

  - platform: homeassistant
    id: wx_condition
    entity_id: sensor.weather_12h_condition
    internal: true

# ============================================================
#  BINARY SENSORS
#  Use as triggers in HA automations.
#  device_class: problem integrates cleanly with HA alerts.
# ============================================================
binary_sensor:
  # true when ANY metric is critical
  - platform: template
    name: "Air Quality Alert"
    id: air_alert
    device_class: problem
    lambda: |-
      return id(overall_status).state == "critical";

  # true when ANY metric is elevated or critical
  - platform: template
    name: "Air Quality Warning"
    id: air_warning
    device_class: problem
    lambda: |-
      return (id(overall_status).state == "elevated" ||
              id(overall_status).state == "critical");

#Display
spi:
  id: bus1
  clk_pin: GPIO19
  mosi_pin: GPIO18

display:
  ## Currently is the new epaper platform not partial update
  ## 128x296
  ##- platform: epaper_spi
  ##  model:  WeAct-2.9in-3c
  - platform: waveshare_epaper
    model: 2.90inv2-r2
    id: epaper_display
    spi_id: bus1
    cs_pin: GPIO01
    dc_pin: GPIO21
    busy_pin: GPIO02
    reset_pin: GPIO0
    rotation: 90
    update_interval: ${display_interval}
    full_update_every: 10
    lambda: |-
      // Dirty Reset
      id(refresh_counter)++;
      // Every 10th update, we tell the component to "setup" again
      if (id(refresh_counter) >= 10) {
        id(refresh_counter) = 0;
        id(epaper_display).setup(); 
        ESP_LOGD("epaper", "Hardware reset!");
      }
      //Constanst for rendering -- NOTE This is for coulor displays - On Black and White they can be reverse!
      //const auto BLACK   = Color(0,   0,   0,   0);
      //const auto RED     = Color(255, 0,   0,   0);
      //const auto WHITE   = Color(255, 255, 255, 0);
      //B&W Couloring
      const auto BLACK   = Color(255, 255, 255, 0);
      const auto WHITE   = Color(0, 0, 0, 0);

      //Base colors used 
      auto base_color = WHITE;
      auto base_txt_color = BLACK;
      auto alert_base_color = BLACK;
      auto alert_txt_color = WHITE;
      
      if (${dark_mode} == 1){
        base_color = BLACK;
        base_txt_color = WHITE;
        alert_base_color = WHITE;
        alert_txt_color = BLACK;
      }
      
      //Constants for the metric cells
      const int cell_width  = 74;
      const int cell_height = 52;
      const int txt_offset  = 12;

      const int top = 0;
      const int top1 = top + cell_height;
      const int top2 = top1 + cell_height;
      const int div = 0;
      const int div1 = div  + cell_width;
      const int div2 = div1 + cell_width;
      const int div3 = div2 + cell_width;

      //Function to draw all value cells in the 2 first lines.
      auto draw_cell = [&](int x, int y,
                          const char* label,
                          float val, int decimals,
                          const std::string& status) {

        esphome::Color text_color = base_txt_color;
        esphome::Color line_color = base_color;                
        esphome::Color fill_color = base_color; 
        if (status == "critical") {
          text_color = alert_txt_color ;
          line_color = alert_base_color;                 
          fill_color = alert_base_color; 
        } else if (status == "elevated") {
          line_color = alert_base_color ;
        }        

        it.filled_rectangle(x+1, y+1, cell_width, cell_height-1, fill_color);
        it.rectangle(x+1, y+1, cell_width-1, cell_height-1, line_color);
        it.rectangle(x+2, y+2, cell_width-3, cell_height-2, line_color);
        it.printf(x+2, y, id(lable_font), text_color, TextAlign::TOP_LEFT, "%s", label);
        if (val != val) {    // NaN
          it.print(x + cell_width-2, y+txt_offset, id(txt_font), text_color, TextAlign::TOP_RIGHT, "--");
        } else if (decimals > 0) {
          it.printf(x + cell_width-2, y+txt_offset, id(txt_font), text_color, TextAlign::TOP_RIGHT, "%.1f", val);
        } else {
          it.printf(x + cell_width-2, y+txt_offset, id(txt_font), text_color, TextAlign::TOP_RIGHT, "%.0f", val);
        }
        if (x > 1) it.line(x,y+2,x,y+cell_height-2, base_txt_color);
      };

      //---------------------------------------Display starts---------------------------------
      it.fill(base_color);

      //Top Line PM
      draw_cell(div,top,"PM1.0", id(pm_1_0).state,1,id(pm1_status).state);
      draw_cell(div1,top,"PM2.5", id(pm_2_5).state,1,id(pm25_status).state);
      draw_cell(div2,top,"PM4.0", id(pm_4_0).state,1,id(pm4_status).state);
      draw_cell(div3,top,"PM10.0", id(pm_10_0).state,1,id(pm10_status).state);
      //Mid line
      it.line(div,top1,it.get_width(),top1, base_txt_color);
      draw_cell(div,top1,"CO2", id(co2).state,0,id(co2_status).state);
      draw_cell(div1,top1,"VOC", id(voc).state,0,id(voc_status).state);
      draw_cell(div2,top1,"NOx", id(nox).state,0,id(nox_status).state);
      draw_cell(div3,top1,"CH2O", id(ch2o).state,0,id(ch2o_status).state);

      //Lower Line
      it.line(div, top2, it.get_width(), top2, base_txt_color);

      // ── Weather MDI icon ─────────────────────────────────────────────
      const int ix = 2;
      const int iy = top2 + 2;
      const int lower_divider = 187;
      std::string cond = id(wx_condition).state;

      const char* wx_icon  = "\U000F0596";  // default: cloudy
      const char* wx_label = "";

      if      (cond == "clear-night")            { wx_icon = "\U000F0594"; wx_label = "Clear";    }
      else if (cond == "sunny")                  { wx_icon = "\U000F0599"; wx_label = "Sunny";    }
      else if (cond == "partlycloudy")           { wx_icon = "\U000F0595"; wx_label = "P.Cloudy"; }
      else if (cond == "cloudy")                 { wx_icon = "\U000F0596"; wx_label = "Cloudy";   }
      else if (cond == "fog")                    { wx_icon = "\U000F067E"; wx_label = "Foggy";    }
      else if (cond == "rainy")                  { wx_icon = "\U000F0590"; wx_label = "Rainy";    }
      else if (cond == "pouring")                { wx_icon = "\U000F0592"; wx_label = "Pouring";  }
      else if (cond == "snowy")                  { wx_icon = "\U000F0597"; wx_label = "Snowy";    }
      else if (cond == "snowy-rainy")            { wx_icon = "\U000F0F33"; wx_label = "Sleet";    }
      else if (cond == "lightning")              { wx_icon = "\U000F0593"; wx_label = "Thunder";  }
      else if (cond == "lightning-rainy")        { wx_icon = "\U000F0593"; wx_label = "Storm";    }
      else if (cond == "windy")                  { wx_icon = "\U000F059D"; wx_label = "Windy";    }
      else if (cond == "windy-variant")          { wx_icon = "\U000F059E"; wx_label = "Windy";    }
      else if (cond == "hail")                   { wx_icon = "\U000F0591"; wx_label = "Hail";     }

      // ── Weather label + values (right of icon) ───────────────────────
      it.print(ix, iy, id(mdi_weather), base_txt_color, wx_icon);
      const int wx = ix + 24;
      const int wy =  iy+4;
      it.printf(wx, wy,  id(lable_font), base_txt_color, TextAlign::TOP_LEFT, "%*s", -9, wx_label);
      if (id(wx_temp).has_state()) {
        it.strftime(lower_divider/2, top2-1, id(mini_lable_font), base_txt_color, TextAlign::TOP_CENTER, "Forcast %H:%M", ESPTime::from_epoch_local(id(wx_time).state));
        it.printf(lower_divider - 2, wy, id(lable_font), base_txt_color, TextAlign::TOP_RIGHT,"%.0f°   %.1fm/s   %.1fmm", id(wx_temp).state, id(wx_wind).state, id(wx_precip).state);
      } else {
        it.print(wx, iy, id(lable_font), base_txt_color, TextAlign::TOP_LEFT, "fetching...");
      }

      // ── Divider + existing temp / humidity / time ────────────────────
      it.line(lower_divider, iy, lower_divider, 126, base_txt_color);
      it.printf(lower_divider + 2, iy,  id(lable_font), base_txt_color, TextAlign::TOP_LEFT, "%.1f°",  id(temp).state);
      it.printf(221, iy,  id(lable_font), base_txt_color, TextAlign::TOP_LEFT, "%.1f%%", id(humidity).state);
      it.strftime(260, iy, id(lable_font), base_txt_color, "%H:%M", id(ha_time).now());

      ESP_LOGD("epaper", "reflash......");